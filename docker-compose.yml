version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sosyal_club_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: clubadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ClubSecure2026!}
      POSTGRES_DB: sosyal_club
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U clubadmin -d sosyal_club" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

services:
  postgres:
    image: postgres:16-alpine
    container_name: sosyal_club_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: clubadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ClubSecure2026!}
      POSTGRES_DB: sosyal_club
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U clubadmin -d sosyal_club" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sosyal_club_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://clubadmin:${POSTGRES_PASSWORD:-ClubSecure2026!}@postgres:5432/sosyal_club
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-super-secret-key-degistirin-bunu-uretimde}
      NEXT_PUBLIC_APP_NAME: Sosyal Kulüp
      NODE_ENV: production
    volumes:
      - ./public/uploads:/app/public/uploads

volumes:
  pgdata:
